<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYK — تسجيل الدخول</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg); }
    .login-box {
      background:var(--card);border:1px solid var(--border);border-radius:16px;
      padding:48px 40px;width:380px;
      box-shadow:0 8px 40px rgba(0,0,0,0.18);
      display:flex;flex-direction:column;align-items:center;gap:20px;
    }
    .login-box img { width:110px; }
    .login-title { font-size:1.1rem;font-weight:700;color:var(--gold); }
    .login-box input {
      width:100%;padding:12px 16px;border-radius:8px;
      border:1px solid var(--border);background:var(--input-bg);
      color:var(--text);font-size:1rem;font-family:var(--font);
      outline:none;transition:border .2s;box-sizing:border-box;
    }
    .login-box input:focus { border-color:var(--gold); }
    .login-box button {
      width:100%;padding:12px;background:var(--gold);color:#000;
      border:none;border-radius:8px;font-size:1rem;font-weight:700;
      cursor:pointer;font-family:var(--font);transition:opacity .2s;
    }
    .login-box button:hover { opacity:.88; }
    .error-msg { color:#e74c3c;font-size:.9rem;display:none; }
  </style>
</head>
<body>
<div class="login-box">
  <img src="logo/SYK-LOGO.png" alt="SYK" onerror="this.style.display='none'">
  <div class="login-title">نظام SYK</div>
  <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
  <input type="password" id="password" placeholder="كلمة المرور">
  <span class="error-msg" id="errMsg">اسم المستخدم أو كلمة المرور غير صحيحة</span>
  <button onclick="doLogin()">دخول</button>
</div>

<script>
  // بيانات المستخدمين — admin + user1 + user2
  const USERS = {
    'Admin':  { pass: 'Admin32413741391', role: 'admin' },
    'User1':  { pass: 'Pass1122',         role: 'user'  },
    'User2':  { pass: 'Pass3344',         role: 'user'  },
  };

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const user = USERS[u];
    if (user && user.pass === p) {
      sessionStorage.setItem('syk_auth', '1');
      sessionStorage.setItem('syk_user', u);
      sessionStorage.setItem('syk_role', user.role);
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('errMsg').style.display = 'block';
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  if (sessionStorage.getItem('syk_auth') === '1') window.location.href = 'dashboard.html';
</script>
</body>
</html>
