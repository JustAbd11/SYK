<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYK — تسجيل الدخول</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: var(--font);
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .login-box img {
      width: 110px;
      margin-bottom: 4px;
    }
    .login-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
    }
    .login-box input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font);
      outline: none;
      transition: border 0.2s;
      box-sizing: border-box;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-box button {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity 0.2s;
    }
    .login-box button:hover { opacity: 0.88; }
    .error-msg {
      color: #e74c3c;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="logo/SYK-LOGO.png" alt="SYK Logo" onerror="this.style.display='none'">
    <div class="login-title">نظام SYK — دخول الإدارة</div>
    <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
    <input type="password" id="password" placeholder="كلمة المرور">
    <span class="error-msg" id="errMsg">اسم المستخدم أو كلمة المرور غير صحيحة</span>
    <button onclick="doLogin()">دخول</button>
  </div>

  <script>
    // بيانات الدخول المحلية (الادمن فقط)
    const ADMIN_USER = 'Admin';
    const ADMIN_PASS = 'Admin32413741391';

    function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        sessionStorage.setItem('syk_auth', '1');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errMsg').style.display = 'block';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    // اذا مسجل بالفعل
    if (sessionStorage.getItem('syk_auth') === '1') window.location.href = 'dashboard.html';
  </script>
</body>
</html>
